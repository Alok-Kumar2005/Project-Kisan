version: '3.8'

# All persistence is on managed cloud services (Neon Postgres + Qdrant Cloud).
# No local database containers are required.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: project-kisan-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
