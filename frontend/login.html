<!DOCTYPE html>
<html lang="en" data-theme="light">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- Skip navigation link for keyboard users -->
  <a class="skip-link" href="#login-form">Skip to login form</a>

  <main class="auth-wrapper" role="main">
    <div class="auth-card">

      <div class="auth-logo" aria-label="Project Kisan">
        <h1>🌾 Project Kisan</h1>
        <p>Your AI farming assistant</p>
      </div>

      <h2>Sign in to your account</h2>

      <!-- Error alert — hidden until needed (Req 8.8) -->
      <div
        id="login-error"
        class="alert alert-error"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      ></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="phone_number">Phone number</label>
          <input
            type="tel"
            id="phone_number"
            name="phone_number"
            autocomplete="tel"
            placeholder="+91XXXXXXXXXX"
            required
            aria-required="true"
            aria-describedby="phone-hint"
          />
          <span id="phone-hint" class="sr-only">Enter your phone number in E.164 format, e.g. +911234567890</span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            placeholder="Enter your password"
            required
            aria-required="true"
          />
        </div>

        <button
          type="submit"
          id="login-btn"
          class="btn btn-primary"
          aria-label="Sign in"
        >
          Sign in
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/signup.html">Create one</a>
      </div>

    </div>
  </main>


  <script type="module" src="/js/auth.js"></script>
</body>
</html>
